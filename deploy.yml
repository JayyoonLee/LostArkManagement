name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main  # 또는 master, 본인이 사용하는 메인 브랜치 이름

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 내려받기
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Node.js 설치
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Clasp 설치
      - name: Install Clasp
        run: npm install -g @google/clasp

      # 4. 인증 정보 생성 (Secret 사용)
      - name: Create ~/.clasprc.json
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # 5. 배포 (Push)
      - name: Push to GAS
        run: clasp push -f